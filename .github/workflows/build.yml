name: Build Real iPhone App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build Raw iOS App
        # Using 'ios' instead of 'ipa' forces a device build without App Store checks
        run: flet build ios --no-codesign

      - name: Upload iPhone App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-iPhone-App
          # This grabs the ARM64 .app bundle built for physical iPhones
          path: build/ios/iphoneos/*.app
          if-no-files-found: error
