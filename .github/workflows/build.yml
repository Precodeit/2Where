name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Create iOS Build
        # This creates the distribution-ready files
        run: flet build ipa

      - name: List files (Troubleshooting)
        # This shows us exactly where the files are in the logs
        run: find build -maxdepth 3

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-Flet-App
          # Flet 1.0/0.84 puts the IPA in the outputs/ipa folder or build/ipa
          path: |
            build/ipa/*.ipa
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
          if-no-files-found: error
