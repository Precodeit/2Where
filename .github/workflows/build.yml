name: Build Real iPhone App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build for Real iPhone (ARM64)
        # 'ipa' targets real devices. '--no-codesign' skips the Apple Dev ID check on the Mac.
        run: flet build ipa --no-codesign

      - name: Upload iPhone App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-iPhone-App
          # This specifically searches for the ARM64 .app bundle inside the generated archive
          path: build/**/*.xcarchive/Products/Applications/*.app
          if-no-files-found: error
