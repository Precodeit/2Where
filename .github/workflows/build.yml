name: Build Real iPhone App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # The "yes |" automatically presses "y" and Enter when Flet asks to install its Flutter SDK
      - name: Build for Real iPhone
        run: yes | flet build ipa

      - name: Upload iPhone App
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-iPhone-App
          path: |
            build/**/*.ipa
            build/**/*.app
            build/**/*.xcarchive
          if-no-files-found: error
