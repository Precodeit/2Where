name: Build iOS App
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build App
        # We build for simulator to avoid the $99 Apple fee requirement
        run: flet build ios-simulator

      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: Precodeit-Flet-App
          # This '**' means "search all subfolders"
          path: build/**/*.app
          if-no-files-found: error
